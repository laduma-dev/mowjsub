[tool.poetry]
name = "contsub"
version = "1.0.2"
description = "Radio astronomy data continuum subtraction tools"
authors = ["Amir Kazemi-Moridani, Sphesihle Makhathini, Mika Naidoo"]
license = "MIT"
readme = "README.md"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.dependencies]
python = ">=3.10,<3.14"
numpy = "^1.22.4"
astropy = "^6.0.0"
scipy = "^1.12.0"
xarray-fits = "*"
xarray = "*"
stimela = "^2.1.2"
zarr = "*"
tdqm = "*"
dask-ms = "*"
dask = "<2024.11.0"


[tool.poetry.scripts]
imcontsub = "contsub.parser.imcontsub:runit"
viscontsub = "contsub.parser.viscontsub:runit"

[tool.poetry.group.dev.dependencies]
jupyter = "*"
matplotlib = "*"

[tool.poetry.group.tests]
optional = true
[tool.poetry.group.tests.dependencies]
pytest = "^7.1.3"
flake8 = "*"


[tool.poetry.group.docs]
optional = true
[tool.poetry.group.docs.dependencies]
Sphinx = "^5.3.0"
sphinx-copybutton = "^0.5.0"
furo = "^2022.9.15"
