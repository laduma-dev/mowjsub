ms:
      info: Input MS file
      dtype: File
      must_exist: yes
      required: yes
      policies:
        positional: true
input-column:
      info: Column which contains the data to be continuum subtracted.
      dtype: str
      default: DATA 
output-column:
      info: Column name to write the continuum subtracted data to
      dtype: str
      default: LINE_DATA  
fit-model:
      info: "Fit function to model the continuum. WARNING: A median-filter continuum model may subsume low SNR line emission, use it with great care."
      dtype: str
      choices:
          - b-spline
          - spline
          - polynomial
          - median-filter
          - scipy-median-filter
          - gcv-spline
      default: b-spline
order:
      info: Order of spline/polynomial or number of top coefficeints to use for DCT reconstruction
      dtype: int
vel-width: 
      info: Width of spline segments or median filter window in km/s.
      dtype: float
chan-width:
      info: Width of spline segments or median filter window in number of channels.
      dtype: int
gcv-lambda:
      info: GCV spline penalty. Zero is equivalent to an interpolating spline, high values lead to a flatter curve. If unset the parameter will be estimated using the GCV criterion; this can be very slow. Experience suggests that values chanwidth/nchan work best.
      dtype: float
segments: 
      info: "## This has been replaced by --vel-width. It will be removed in future releases ## Width of spline segments or median filter window in km/s. If given as a list, then it must have same size as --order."
      dtype: float
spwid:
      info: Spectral Window ID
      dtype: int
      default: 0
field-id:
      info: Field ID 
      dtype: int
      default: 0
row-chunks: 
      info: Chunking strategy (Done along the time axis)
      dtype: int
      default: 10000
time-chunks:
      info: Chunk size for time axis
      dtype: int
      default: 64
bl-chunks:
      info: Chunk size for baseline axis
      dtype: int
      default: 10
cont-fit-tol:
      info: "Minimum perentage of valid spectrum data points required to do a fit.
            If the percentage of data points is below this percentage, original data will be returned."
      dtype: float
      default: 0
nworkers:
      info: Number of workers (one per CPU)
      dtype: int
      default: 4
output-ms:
      info: If provided, write the output to a new MS with this name. Otherwise, add new column to the input MS.
      dtype: File
      required: False
load-from-cache:
      info: Load the MS from a cache (give Zarr file name) if available, otherwise create it.
      dtype: File
      required: False